{% extends "base.html" %}
{% block title %}Admin{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-end mb-3">
  <div>
    <h1 class="h4 mb-0">Admin dashboard</h1>
    <div class="text-muted">Quick view of all users.</div>
  </div>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <div class="table-responsive">
      <table class="table table-sm align-middle">
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Role</th>
          </tr>
        </thead>
        <tbody>
          {% for u in users %}
            <tr>
              <td>{{ u.id }}</td>
              <td>{{ u.username }}</td>
              <td><span class="badge text-bg-light border">{{ u.role.value }}</span></td>
            </tr>
          {% else %}
            <tr><td colspan="3" class="text-muted">No users.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
