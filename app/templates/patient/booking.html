{% extends "base.html" %}
{% block title %}Book appointment{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h5 mb-2">Confirm booking</h1>
        <p class="text-muted mb-3">Click confirm to create an appointment in status <strong>PENDING</strong>.</p>
        <form method="post">
          {{ form.csrf_token }}
          <button class="btn btn-primary w-100" type="submit">{{ form.submit.label.text }}</button>
        </form>
      </div>
      <div class="card-footer bg-white">
        <a class="btn btn-outline-secondary w-100" href="{{ url_for('patient.search') }}">Back</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
